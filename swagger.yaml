          type: string
        created_at:
          type: string
      required:
      - id
      - question_id
      - output
      - using_model
      - created_at
    ChatbotMessageRequest:
      type: object
      description: 챗봇 대화 요청 (QNA / CS 상담 공통)
      properties:
        message:
          type: string
          minLength: 1
      required:
      - message
    ChatbotHistoryItem:
      type: object
