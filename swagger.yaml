          type: integer
          format: int64
        img_urls:
          type: array
          items:
            type: string
      required:
      - title
      - content
      - category_id
    QuestionUpdateResponse:
      type: object
      properties:
        question_id:
          type: integer
          format: int64
        updated_at:
          type: string
      required:
      - question_id
      - updated_at
    AnswerCreateRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        img_urls:
          type: array
          items:
            type: string
      required:
      - content
    AnswerCreateResponse:
      type: object
      properties:
        answer_id:
          type: integer
          format: int64
        question_id:
          type: integer
          format: int64
        author_id:
          type: integer
          format: int64
        created_at:
          type: string
      required:
      - answer_id
      - question_id
      - author_id
      - created_at
    AnswerUpdateRequest:
      type: object
      properties:
        content:
          type: string
