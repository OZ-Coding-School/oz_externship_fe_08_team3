openapi: 3.0.3
info:
  title: 오즈 코딩 스쿨 Backend API - QnA & Chatbot
  version: 1.0.0
  description: 오즈 코딩 스쿨의 질의응답(QnA) 및 챗봇 관련 API입니다.
paths:
  /api/v1/qna/questions:
    get:
      operationId: v1_qna_questions_list
      description: 질문 목록을 조회하며, 전역 설정된 페이지네이션이 적용됩니다.
      summary: 질의응답 목록 조회 API
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 페이지 번호
      - in: query
        name: page_size
        schema:
          type: integer
        description: 한 페이지 당 보여줄 개수
      - in: query
        name: search_keyword
        schema:
          type: string
        description: 검색어
      - in: query
        name: category_id
        schema:
          type: integer
        description: 카테고리 ID 필터
      - in: query
        name: answer_status
        schema:
          type: string
        description: 답변 상태 (answered/unanswered)
      - in: query
        name: sort
        schema:
          type: string
        description: '정렬 (latest: 최신순, views: 조회수순)'
      tags:
      - Qna
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionListResponse'
              examples:
                SuccessExample:
                  value:
                    count: 152
                    next: null
                    previous: null
                    results:
                    - id: 10501
                      category:
                        id: 12
                        depth: 2
                        names: ["백엔드", "Django", "ORM"]
                      author:
                        id: 211
                        nickname: "한율_회장"
                        profile_img_url: "https://cdn.ozcodingschool.com/profiles/user_123.png"
                        course_name: "백엔드 개발자 과정"
                        cohort_number: 14
                      title: "Django ORM 역참조는 어떻게 사용하나요?"
                      content_preview: "ForeignKey에 related_name을 지정하면..."
                      answer_count: 3
                      view_count: 87
                      created_at: "2025-03-01 10:03:21"
                      thumbnail_img_url: "https://cdn.ozcodingschool.com/qna/thumb_10501_01.png"
                  summary: 질의응답 목록 조회 성공 예시
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                BadRequest:
                  value:
                    error_detail: 유효하지 않은 목록 조회 요청입니다.
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                NotFound:
                  value:
                    error_detail: 조회 가능한 질문이 존재하지 않습니다.
          description: Not Found
    post:
      operationId: v1_qna_questions_create
      description: 새로운 질문을 등록합니다.
      summary: 질문등록 API
      tags:
      - Qna
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionCreateRequest'
            examples:
              RequestExample:
                value:
                  title: "Django에서 ForeignKey 역참조는 어떻게 하나요?"
                  content: "Django 모델에서 related_name을 지정했을 때 역참조 하는 방법이 궁금합니다."
                  category_id: 32
                  img_urls:
                  - "https://my-bucket.s3.ap-northeast-2.amazonaws.com/uploads/images/questions/uuid.png"
                summary: 질문 등록 요청 예시
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuestionCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuestionCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionCreateResponse'
              examples:
                SuccessExample:
                  value:
                    message: "질문이 성공적으로 등록되었습니다."
                    question_id: 10501
                  summary: 질문 등록 성공 예시
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                BadRequest:
                  value:
                    error_detail: 유효하지 않은 질문 등록 요청입니다.
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Unauthorized:
                  value:
                    error_detail: 로그인한 수강생만 질문을 등록할 수 있습니다.
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Forbidden:
                  value:
                    error_detail: 질문 등록 권한이 없습니다.
          description: Forbidden
  /api/v1/qna/questions/{question_id}:
    get:
      operationId: v1_qna_questions_retrieve
      description: 질문 상세조회을 조회하고 조회수를 1 올립니다.
      summary: 질의응답 상세 조회 API
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - Qna
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionDetail'
              examples:
                SuccessExample:
                  value:
                    id: 10501
                    title: "Django에서 ForeignKey 역참조는 어떻게 하나요?"
                    content: "Django 모델에서 related_name을 지정했을 때..."
                    category:
                      id: 12
                      depth: 2
                      names: ["백엔드", "Django", "ORM"]
                    images:
                    - id: 3
                      img_url: "https://cdn.ozcodingschool.com/qna/img_20250301_101530.png"
                    view_count: 88
                    created_at: "2025-03-01 10:25:33"
                    author:
                      id: 211
                      nickname: "한솔_회장"
                      profile_img_url: null
                    answers:
                    - id: 501
                      content: "related_name을 지정하면 역참조 시 해당 이름으로 접근할 수 있습니다. 예를 들어 `post.comments.all()` 형태로 사용합니다."
                      created_at: "2025-03-01 11:30:00"
                      is_adopted: true
                      author:
                        id: 102
                        nickname: "django_master"
                        profile_img_url: "https://cdn.ozcodingschool.com/profile/user102.png"
                      comments:
                      - id: 1001
                        content: "답변 감사합니다! 덕분에 이해됐어요."
                        created_at: "2025-03-01 12:00:00"
                        author:
                          id: 211
                          nickname: "한솔_회장"
                          profile_img_url: null
                          course_name: "백엔드 개발자 과정"
                          cohort_number: 8
                  summary: 질의응답 상세 조회 성공 예시
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                BadRequest:
                  value:
                    error_detail: 유효하지 않은 질문 상세 조회 요청입니다.
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                NotFound:
                  value:
                    error_detail: 해당 질문을 찾을 수 없습니다.
          description: Not Found
    put:
      operationId: v1_qna_questions_update
      description: 기존 질문 내용을 수정합니다.
      summary: 질문 수정 API
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - Qna
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionUpdateRequest'
            examples:
              RequestExample:
                value:
                  title: "Django ORM 역참조 사용 방법 정리"
                  content: "ForeignKey의 related_name을 지정하면 역참조가 가능합니다.\n\n예시 코드:\n```python\npost.comment_set.all()\n```"
                  category_id: 32
                  img_urls:
                  - "https://my-bucket.s3.ap-northeast-2.amazonaws.com/uploads/images/questions/uuid.png"
                summary: 질문 수정 요청 예시
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuestionUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuestionUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionUpdateResponse'
              examples:
                SuccessExample:
                  value:
                    question_id: 10501
                    updated_at: "2025-03-02 14:14:22"
                  summary: 질문 수정 성공 예시
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                BadRequest:
                  value:
                    error_detail: 유효하지 않은 질문 수정 요청입니다.
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Unauthorized:
                  value:
                    error_detail: 로그인한 사용자만 질문을 수정할 수 있습니다.
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Forbidden:
                  value:
                    error_detail: 본인이 작성한 질문만 수정할 수 있습니다.
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                NotFound:
                  value:
                    error_detail: 해당 질문을 찾을 수 없습니다.
          description: Not Found
  /api/v1/qna/questions/{question_id}/answers:
    post:
      operationId: v1_qna_questions_answers_create
      summary: 답변 등록 API
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - Qna
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerCreateRequest'
            examples:
              RequestExample:
                value:
                  content: "Django ORM 역참조는 `related_name`을 사용하여 접근할 수 있습니다.\n\n```python\npost.comment_set.all()\n```"
                  img_urls:
                  - "https://cdn.ozcodingschool.com/qna/answer_img_1001.png"
                summary: 답변 등록 요청 예시
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnswerCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnswerCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerCreateResponse'
              examples:
                SuccessExample:
                  value:
                    answer_id: 801
                    question_id: 10501
                    author_id: 211
                    created_at: "2025-03-02 11:43:20"
                  summary: 답변 등록 성공 예시
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                BadRequest:
                  value:
                    error_detail: 유효하지 않은 답변 등록 요청입니다.
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Unauthorized:
                  value:
                    error_detail: 로그인한 사용자만 답변을 작성할 수 있습니다.
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Forbidden:
                  value:
                    error_detail: 답변 작성 권한이 없습니다.
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                NotFound:
                  value:
                    error_detail: 해당 질문을 찾을 수 없습니다.
          description: Not Found
  /api/v1/qna/questions/{question_id}/ai-answer:
    post:
      operationId: v1_qna_questions_ai_answer_create
      summary: AI 답변 생성 API
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - Qna
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAnswerResponse'
              examples:
                SuccessExample:
                  value:
                    id: 8751
                    question_id: 10221
                    output: "리스트는 수정 가능한 자료구조이며, 튜플은 수정이 불가능한 자료구조입니다. 리스트는 [], 튜플은 () 를 사용합니다."
                    using_model: "gemini-2.5-pro"
                    created_at: "2025-03-01 14:20:33"
                  summary: AI 답변 생성 성공 예시
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                BadRequest:
                  value:
                    error_detail: 유효하지 않은 데이터 요청입니다.
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Unauthorized:
                  value:
                    error_detail: 로그인한 사용자만 요청할 수 있습니다.
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Forbidden:
                  value:
                    error_detail: AI 답변 생성 권한이 없습니다.
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                NotFound:
                  value:
                    error_detail: 질문 데이터를 찾을 수 없습니다.
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Conflict:
                  value:
                    error_detail: 이미 AI가 답변을 생성했습니다.
          description: Conflict
  /api/v1/qna/questions/{question_id}/chatbot:
    get:
      operationId: v1_qna_questions_chatbot_retrieve
      description: 특정 질문에 대한 QnA 챗봇 대화 히스토리를 조회합니다. 세션이 없거나 만료된 경우 빈 배열을 반환합니다.
      summary: QNA 히스토리 조회 API
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - Chatbot
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotHistoryResponse'
              examples:
                SuccessExample:
                  value:
                    results:
                    - role: "assistant"
                      message: "related_name을 지정하면 역참조 시..."
                    - role: "user"
                      message: "예시 좀 보여줘"
                    - role: "assistant"
                      message: "예를 들어 Django 모델에서..."
                  summary: QNA 히스토리 조회 성공 예시
                EmptySessionExample:
                  value:
                    results: []
                  summary: 세션 없음 / 만료된 경우
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Unauthorized:
                  value:
                    error_detail: 로그인한 사용자만 이용할 수 있습니다.
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                NotFound:
                  value:
                    error_detail: 해당 질문을 찾을 수 없습니다.
          description: Not Found
    post:
      operationId: v1_qna_questions_chatbot_create
      description: 특정 질문에 대한 QnA 챗봇과 대화합니다. SSE(Server-Sent Events) 방식으로 응답이 스트리밍됩니다.
      summary: QNA 챗봇 대화 API
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - Chatbot
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
            examples:
              RequestExample:
                value:
                  message: "related_name 예시 좀 보여줘"
                summary: QNA 챗봇 대화 요청 예시
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
                description: |-
                  SSE(Server-Sent Events) 스트리밍 응답 형식:
                  data: {"message": str}\n\n
                  data: {"message": str}\n\n
                  ...
                  data: [DONE]\n\n
              examples:
                SSEExample:
                  value: |
                    data: {"message": "예를 들어"}

                    data: {"message": " Django 모델에서"}

                    data: {"message": " post.comment_set.all() 로 접근할 수 있습니다."}

                    data: [DONE]
                  summary: SSE 스트리밍 응답 예시
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Unauthorized:
                  value:
                    error_detail: 로그인한 사용자만 이용할 수 있습니다.
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                NotFound:
                  value:
                    error_detail: 해당 질문을 찾을 수 없습니다.
          description: Not Found
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                TooManyRequests:
                  value:
                    error_detail: 더 필요한 질문은 질문 게시판을 이용해주세요.
          description: Too Many Requests
  /api/v1/chatbot/completions:
    get:
      operationId: v1_chatbot_completions_retrieve
      description: CS 상담 챗봇의 대화 히스토리를 조회합니다. 세션이 없거나 만료된 경우 빈 배열을 반환합니다.
      summary: CS 상담 챗봇 히스토리 조회 API
      tags:
      - Chatbot
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotHistoryResponse'
              examples:
                SuccessExample:
                  value:
                    results:
                    - role: "user"
                      message: "수강 신청은 어떻게 하나요?"
                    - role: "assistant"
                      message: "수강 신청은 메인 페이지에서 원하는 과정을 선택한 뒤 신청 버튼을 누르시면 됩니다."
                    - role: "user"
                      message: "그럼 탈퇴는 어떻게 되나요?"
                    - role: "assistant"
                      message: "탈퇴는 회원정보 수정 탭에서 탈퇴 신청을 누르면 7일 뒤 탈퇴 처리됩니다."
                  summary: CS 상담 챗봇 히스토리 조회 성공 예시
                EmptySessionExample:
                  value:
                    results: []
                  summary: 세션 없음 / 만료된 경우
          description: OK
