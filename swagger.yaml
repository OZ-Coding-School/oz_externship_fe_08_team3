components:
  schemas:
    ErrorDetailString:
      type: object
      properties:
        error_detail:
          type: string
      required:
      - error_detail
    Category:
      type: object
      description: 카테고리 정보 (depth와 names 배열로 카테고리 경로 표현)
      properties:
        id:
          type: integer
          format: int64
        depth:
          type: integer
        names:
          type: array
          items:
            type: string
      required:
      - id
      - depth
      - names
    QuestionAuthor:
      type: object
      description: 질문/댓글 작성자 정보
      properties:
        id:
          type: integer
          format: int64
        nickname:
          type: string
        profile_img_url:
          type: string
          nullable: true
        course_name:
          type: string
          nullable: true
        cohort_number:
          type: integer
          nullable: true
      required:
      - id
      - nickname
    QuestionImage:
      type: object
      properties:
        id:
          type: integer
          format: int64
        img_url:
          type: string
      required:
      - id
      - img_url
    AnswerCommentItem:
      type: object
      description: 답변에 달린 댓글
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string
        created_at:
          type: string
        author:
          $ref: '#/components/schemas/QuestionAuthor'
      required:
      - id
      - content
      - created_at
      - author
    AnswerItem:
      type: object
      description: 질문 상세 조회 시 포함되는 답변 정보
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string
        created_at:
          type: string
        is_adopted:
          type: boolean
        author:
          $ref: '#/components/schemas/QuestionAuthor'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/AnswerCommentItem'
      required:
      - id
      - content
      - created_at
      - is_adopted
      - author
      - comments
    QuestionListItem:
      type: object
      description: 질의응답 목록 조회 시 각 질문 아이템
      properties:
        id:
          type: integer
          format: int64
        category:
          $ref: '#/components/schemas/Category'
        author:
          $ref: '#/components/schemas/QuestionAuthor'
        title:
          type: string
        content_preview:
          type: string
        answer_count:
          type: integer
        view_count:
          type: integer
        created_at:
          type: string
        thumbnail_img_url:
          type: string
          nullable: true
      required:
      - id
      - category
      - author
      - title
      - content_preview
      - answer_count
      - view_count
      - created_at
    QuestionListResponse:
      type: object
      description: 질의응답 목록 조회 응답 (페이지네이션)
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/QuestionListItem'
      required:
      - count
      - results
    QuestionCreateRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        category_id:
          type: integer
          format: int64
        img_urls:
          type: array
          items:
            type: string
      required:
      - title
      - content
      - category_id
    QuestionCreateResponse:
      type: object
      properties:
        message:
          type: string
        question_id:
          type: integer
          format: int64
      required:
      - message
      - question_id
    QuestionDetail:
      type: object
      description: 질의응답 상세 조회 응답
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        images:
