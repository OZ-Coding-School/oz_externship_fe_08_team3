    post:
      operationId: v1_chatbot_completions_create
      description: CS 상담 챗봇과 대화합니다. SSE(Server-Sent Events) 방식으로 응답이 스트리밍됩니다.
      summary: CS 상담 챗봇 응답 API
      tags:
      - Chatbot
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
            examples:
              RequestExample:
                value:
                  message: "수강 신청은 어떻게 하나요?"
                summary: CS 상담 챗봇 요청 예시
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
                description: |-
                  SSE(Server-Sent Events) 스트리밍 응답 형식:
                  data: {"message": str}\n\n
                  data: {"message": str}\n\n
                  ...
                  data: [DONE]\n\n
              examples:
                SSEExample:
                  value: |
                    data: {"message": "탈퇴는"}

                    data: {"message": " 회원정보 수정 탭에서"}

                    data: {"message": " 탈퇴 신청을 누르면 7일 뒤 탈퇴 처리됩니다."}

                    data: [DONE]
                  summary: SSE 스트리밍 응답 예시
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                BadRequest:
                  value:
                    error_detail: message 필드는 필수 항목입니다.
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
              examples:
                Unauthorized:
                  value:
                    error_detail: 로그인한 사용자만 이용할 수 있습니다.
          description: Unauthorized
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailString'
          description: Too Many Requests
