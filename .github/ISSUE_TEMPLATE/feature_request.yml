name: Feature Request
description: 새로운 기능을 제안합니다.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        기능 제안 감사합니다. 아래 항목을 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능을 원하시나요?
      placeholder: 기능에 대한 설명을 입력하세요.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 필요한 이유
      description: 이 기능이 왜 필요한지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방법
      description: 어떻게 구현하면 좋을지 아이디어가 있다면 알려주세요.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려한 다른 대안이 있나요?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고할 자료나 스크린샷이 있다면 첨부해주세요.
    validations:
      required: false
