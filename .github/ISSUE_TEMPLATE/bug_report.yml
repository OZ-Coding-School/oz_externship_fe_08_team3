name: Bug Report
description: 버그를 제보합니다.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 제보 감사합니다. 아래 항목을 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 간단히 설명해주세요.
      placeholder: 버그에 대한 설명을 입력하세요.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하기 위한 단계를 알려주세요.
      placeholder: |
        1. '...' 페이지로 이동
        2. '...' 버튼 클릭
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했다면 어떻게 되어야 하나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떻게 동작했나요?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 스크린샷이 있다면 첨부해주세요.
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: 환경
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - 기타
    validations:
      required: false
